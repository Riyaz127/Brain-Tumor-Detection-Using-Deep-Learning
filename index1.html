<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tumor Detection System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e3f2fd);
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            border-radius: 15px;
            transition: all 0.3s ease-in-out;
        }

        .card.dragover {
            border: 2px dashed #0d6efd;
            background-color: #e9f5ff;
            transform: scale(1.02);
        }

        #results img {
            max-height: 400px;
            margin-top: 15px;
        }

        .btn {
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn:disabled {
            opacity: 0.8;
        }

        .lead {
            margin-bottom: 30px;
        }

        #preview {
            max-height: 250px;
            margin-top: 15px;
            display: none;
        }

        #results {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="text-center">
        <h1 class="display-4 text-primary">MRI Tumor Detection System</h1>
        <p class="lead text-secondary">
            Upload an MRI image to detect if there is a tumor and its type.
        </p>
    </div>

    <!-- Upload Card -->
    <div class="card shadow p-4 mt-4" id="uploadCard">
        <form method="POST" enctype="multipart/form-data" id="uploadForm">
            <div class="mb-3">
                <label for="file" class="form-label">Select MRI Image:</label>
                <input type="file"
                       class="form-control"
                       id="file"
                       name="file"
                       accept="image/*"
                       required>
                <img id="preview" class="img-fluid rounded">
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">
                Upload and Detect
            </button>

            <!-- Spinner -->
            <div class="text-center mt-3" id="loadingSpinner" style="display:none;">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-primary">Processing MRI Image...</p>
            </div>
        </form>
    </div>

    {% if result %}
    <!-- Results Section -->
    <div id="results" class="mt-4">
        <div class="card shadow">
            <div class="card-body text-center">
                <h4 class="card-title text-success">{{ result }}</h4>
                <p class="card-text text-muted">
                    Confidence: {{ confidence }}%
                </p>

                <!-- Confidence Progress Bar -->
                <div class="progress mb-3">
                    <div class="progress-bar bg-success"
                         role="progressbar"
                         style="width: {{ confidence }}%;"
                         aria-valuenow="{{ confidence }}"
                         aria-valuemin="0"
                         aria-valuemax="100">
                        {{ confidence }}%
                    </div>
                </div>

                <img src="{{ file_path }}"
                     class="img-fluid rounded"
                     alt="Uploaded Image">
            </div>
        </div>
    </div>
    {% endif %}
</div>

<!-- JavaScript -->
<script>
    const form = document.getElementById("uploadForm");
    const fileInput = document.getElementById("file");
    const preview = document.getElementById("preview");
    const button = document.getElementById("submitBtn");
    const spinner = document.getElementById("loadingSpinner");
    const uploadCard = document.getElementById("uploadCard");

    // Image Preview
    fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function (e) {
                preview.src = e.target.result;
                preview.style.display = "block";
            };
            reader.readAsDataURL(file);
        }
    });

    // Form Submit
    form.addEventListener("submit", function () {
        spinner.style.display = "block";
        button.disabled = true;
        button.innerText = "Detecting...";
    });

    // Drag and Drop
    uploadCard.addEventListener("dragover", (e) => {
        e.preventDefault();
        uploadCard.classList.add("dragover");
    });

    uploadCard.addEventListener("dragleave", () => {
        uploadCard.classList.remove("dragover");
    });

    uploadCard.addEventListener("drop", (e) => {
        e.preventDefault();
        uploadCard.classList.remove("dragover");
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event("change"));
    });

    // Fade In Results
    window.addEventListener("load", () => {
        const results = document.getElementById("results");
        if (results) {
            setTimeout(() => {
                results.style.opacity = "1";
            }, 300);
        }
    });
</script>

</body>
</html>
